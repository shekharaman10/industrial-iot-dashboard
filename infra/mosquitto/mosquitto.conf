# ─── Mosquitto MQTT Broker Configuration ─────────────────────────────────────
# Version: Mosquitto 2.x
# Used by: ESP32 edge devices + .NET backend subscriber

# Network
listener 1883
protocol mqtt

# WebSocket listener (useful for browser-based debugging tools)
listener 9001
protocol websockets

# Logging
log_type error
log_type warning
log_type notice
log_type information
log_dest stdout

# Persistence: replay retained messages on broker restart
persistence          true
persistence_location /mosquitto/data/
autosave_interval    60

# Security
# In development, allow anonymous connections.
# In production, replace with password_file + TLS listener on port 8883.
allow_anonymous true

# Message limits
max_packet_size         65536     # 64 KB — sufficient for any sensor payload
max_inflight_messages   20
max_queued_messages     1000

# Keep-alive
# Clients missing 1.5× their keep-alive period are considered disconnected.
# This triggers Last-Will-Testament publication.
