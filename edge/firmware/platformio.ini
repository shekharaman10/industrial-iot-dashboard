; ─── PlatformIO Project Configuration ──────────────────────────────────────────
; Target  : ESP32 DevKit v1 (Espressif ESP32-WROOM-32)
; Framework: Arduino (C++17)
; Tool    : PlatformIO Core 6.x
;
; Build profiles:
;   default (dev)  — serial debug enabled, verbose MQTT
;   release        — minimal logging, optimised for flash size

[platformio]
default_envs = esp32dev

; ─── Shared settings ──────────────────────────────────────────────────────────
[env]
platform     = espressif32
board        = esp32dev
framework    = arduino
monitor_speed= 115200
upload_speed = 921600

lib_deps =
    knolleary/PubSubClient          @ ^2.8.0
    adafruit/DHT sensor library     @ ^1.4.6
    adafruit/Adafruit MPU6050       @ ^2.2.6
    adafruit/Adafruit Unified Sensor@ ^1.1.14
    bblanchon/ArduinoJson           @ ^6.21.5

; ─── Development build ────────────────────────────────────────────────────────
[env:esp32dev]
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ARDUHAL_LOG_COLORS=1
    -DWIFI_SSID=\"DEV_SSID\"
    -DWIFI_PASSWORD=\"DEV_PASS\"
    -DMQTT_HOST=\"192.168.1.100\"

; ─── Release / production build ───────────────────────────────────────────────
[env:esp32_release]
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0     ; suppress all Serial output
    -Os                      ; optimise for size
    -DWIFI_SSID=\"PROD_SSID\"
    -DWIFI_PASSWORD=\"PROD_PASS\"
    -DMQTT_HOST=\"10.0.0.50\"
build_type = release
