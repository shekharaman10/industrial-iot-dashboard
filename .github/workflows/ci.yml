name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: Build, Test, Docker ────────────────────────────────────────────
  backend:
    name: Backend (.NET 8)
    runs-on: ubuntu-latest

    services:
      # Spin up Postgres for integration tests
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       testdb
          POSTGRES_USER:     test
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore NuGet packages
        working-directory: backend
        run: dotnet restore IotDashboard.sln

      - name: Build (Release)
        working-directory: backend
        run: dotnet build IotDashboard.sln -c Release --no-restore

      - name: Run unit tests
        working-directory: backend
        run: |
          dotnet test tests/UnitTests/IotDashboard.Tests.UnitTests.csproj \
            --no-build -c Release \
            --logger "trx;LogFileName=unit-results.trx" \
            --collect:"XPlat Code Coverage"

      - name: Run integration tests (parser-level, no broker needed)
        working-directory: backend
        run: |
          dotnet test tests/IntegrationTests/IotDashboard.Tests.IntegrationTests.csproj \
            --no-build -c Release \
            --logger "trx;LogFileName=integration-results.trx"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name:    .NET Tests
          path:    backend/**/*.trx
          reporter: dotnet-trx

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/**/coverage.cobertura.xml
          flags: backend

      - name: Build Docker image
        working-directory: backend
        run: docker build -t iot-backend:${{ github.sha }} .

  # ── Frontend: Install, Lint, Build ─────────────────────────────────────────
  frontend:
    name: Frontend (Node 20 / React)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build production bundle
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8080
          VITE_SIGNALR_URL: http://localhost:8080/hubs/sensors
        run: npm run build

      - name: Build Docker image
        working-directory: frontend
        run: docker build -t iot-frontend:${{ github.sha }} .

  # ── Edge: PlatformIO build check ────────────────────────────────────────────
  edge:
    name: Edge Firmware (PlatformIO / ESP32)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware (dev profile)
        working-directory: edge/firmware
        run: pio run -e esp32dev

      - name: Build firmware (release profile)
        working-directory: edge/firmware
        run: pio run -e esp32_release

  # ── Simulator: Python lint ──────────────────────────────────────────────────
  simulator:
    name: Simulator (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install paho-mqtt pyflakes

      - name: Syntax check
        run: python -m pyflakes data/simulation-scripts/simulate_sensors.py
